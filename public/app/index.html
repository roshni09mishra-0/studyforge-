<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StudyForge AI — App</title>
    <link rel="icon" href="/assets/img/logo.svg" />
    <link rel="stylesheet" href="/assets/css/app.css" />
    <!-- Charts (analytics) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <img src="/assets/img/logo.svg" alt="StudyForge AI" />
          <span class="tag">AI Study</span>
        </div>

        <nav class="nav" id="nav">
          <a href="/app/dashboard" data-route="/dashboard"><span class="icon">🏠</span> Dashboard</a>
          <a href="/app/summarizer" data-route="/summarizer"><span class="icon">📝</span> Notes Summarizer</a>
          <a href="/app/quiz" data-route="/quiz"><span class="icon">🧠</span> Quiz Generator</a>
          <a href="/app/flashcards" data-route="/flashcards"><span class="icon">🃏</span> Flashcards</a>
          <a href="/app/review" data-route="/review"><span class="icon">✅</span> Daily Review</a>
          <a href="/app/planner" data-route="/planner"><span class="icon">🗓️</span> Study Planner</a>
          <a href="/app/library" data-route="/library"><span class="icon">📚</span> Resource Library</a>
          <a href="/app/analytics" data-route="/analytics"><span class="icon">📈</span> Analytics</a>
          <a href="/app/billing" data-route="/billing"><span class="icon">💳</span> Billing & Credits</a>
          <div class="spacer"></div>
          <a href="/app/profile" data-route="/profile"><span class="icon">⚙️</span> Profile Settings</a>
        </nav>

        <div class="sidebar-footer">
          <div class="pill">
            <div>
              <div style="font-weight:700; font-size:13px" id="userName">Signed out</div>
              <small id="userEmail">—</small>
              <div style="margin-top:6px">
                <span class="badge" id="creditsBadge">Credits: —</span>
              </div>
            </div>
            <button class="btn small" id="themeBtn" title="Toggle theme">Theme</button>
          </div>
          <button class="btn danger" id="logoutBtn">Log out</button>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <h1 id="pageTitle">Dashboard</h1>
            <div class="muted" id="pageSubtitle">Your AI-powered study hub.</div>
          </div>
          <div class="right">
            <span class="badge" id="streakBadge">Streak: —</span>
            <a class="btn small" href="/" title="Back to landing">Landing</a>
          </div>
        </div>

        <div id="view" class="grid"></div>
      </main>
    </div>

    <nav class="mobile-nav" id="mobileNav" aria-label="Mobile navigation">
      <a href="/app/dashboard" data-route="/dashboard" title="Dashboard">🏠</a>
      <a href="/app/summarizer" data-route="/summarizer" title="Summarize">📝</a>
      <a href="/app/quiz" data-route="/quiz" title="Quiz">🧠</a>
      <a href="/app/review" data-route="/review" title="Review">✅</a>
      <a href="/app/profile" data-route="/profile" title="Profile">⚙️</a>
    </nav>

    <div class="toast" id="toast">
      <div class="title" id="toastTitle">Notice</div>
      <div class="msg" id="toastMsg"></div>
    </div>

    <script type="module" src="/app/app.js"></script>
  </body>
</html>
